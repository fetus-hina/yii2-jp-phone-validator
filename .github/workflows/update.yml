name: 'Automatic Database Updator'
'on':
  schedule:
    -
      cron: '43 9 * * *'
jobs:
  update:
    name: 'Update database'
    runs-on: ubuntu-24.04
    steps:
      -
        name: 'Check out the source'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      -
        name: 'Use PHP 8.5'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      -
        name: 'Install dependencies'
        run: |
          composer install --prefer-dist
      -
        name: 'Run Updator'
        run: |
          echo "::group::Remove old data"
          rm -rf data/phone/*
          echo "::endgroup::"

          echo "::group::Update data (landline)"
          php util/mkphone-kotei.php
          echo "::endgroup::"

          echo "::group::Update data (mobile phone)"
          php util/mkphone-mobile.php
          echo "::endgroup::"

          echo "::group::Update data (IP phone)"
          php util/mkphone-ip.php
          echo "::endgroup::"

          echo "::group::Update data (freedial etc)"
          php util/mkphone-others-0xx0-xxx-xxx.php
          echo "::endgroup::"

          echo "::group::Update data (M2M)"
          php util/mkphone-m2m.php
          echo "::endgroup::"
      -
        # GITHUB_TOKEN で作成した PR は CI ワークフローを起動しないため、
        # 壊れたデータで PR を作らないようここでテストする。
        name: 'Verify the regenerated data'
        run: vendor/bin/phpunit
      -
        name: 'Check changed'
        run: |
          git add data/phone
          git update-index -q --refresh
          if [ -z "$(git diff-index --name-only HEAD --)" ]; then
            echo "Nothing changed"
            echo "changed=0" >> $GITHUB_ENV
          else
            echo "Something changed"
            echo "changed=1" >> $GITHUB_ENV
          fi
      -
        name: 'Create Pull Request'
        if: '${{ env.changed == ''1'' }}'
        uses: peter-evans/create-pull-request@v8
        with:
          assignees: fetus-hina
          author: 'AIZAWA Hina <hina@fetus.jp>'
          body: 'This is an automated pull-request'
          branch: autoupdate-database
          commit-message: 'Update database'
          committer: 'GitHub <noreply@github.com>'
          delete-branch: true
          draft: false
          labels: database
          reviewers: fetus-hina
          signoff: false
          title: 'Update database'
